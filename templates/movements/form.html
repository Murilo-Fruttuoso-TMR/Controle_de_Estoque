{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-xl-7">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 mb-1">Registrar movimentação</h1>
                <p class="text-muted mb-0">Entrada e saída com trilha de auditoria por usuário.</p>
            </div>
            <a class="btn btn-outline-secondary" href="{{ url_for('main.movements_list') }}">Voltar</a>
        </div>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="post" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Produto</label>
                        <select class="form-select" name="product_id" required>
                            <option value="">Selecione</option>
                            {% for product in products %}
                            <option value="{{ product.id }}" {% if selected_product_id == product.id %}selected{% endif %}>{{ product.name }} (saldo {{ '%.2f'|format(product.quantity) }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Direção</label>
                        <select class="form-select" name="direction" required>
                            <option value="IN">Entrada</option>
                            <option value="OUT">Saída</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Quantidade</label>
                        <input class="form-control" type="number" name="quantity" step="any" min="0.01" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Tipo</label>
                        <input class="form-control" name="reason" placeholder="compra, devolução, venda, uso, perda..." required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Observações</label>
                        <textarea class="form-control" name="note" rows="3"></textarea>
                    </div>
                    <div class="col-12 d-flex justify-content-end gap-2 mt-3">
                        <a class="btn btn-outline-secondary" href="{{ url_for('main.movements_list') }}">Cancelar</a>
                        <button class="btn btn-primary">Salvar movimentação</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
